<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sort The Trash - Mobile Fullscreen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; 
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            /* Mencegah layar goyang/scrolling di mobile */
            position: fixed;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        canvas {
            background-color: #000;
            /* Memaksa canvas mengisi layar landscape */
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            display: block;
        }

        #bgVideo {
            display: none;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <video id="bgVideo" src="assets/bg_main_menu.mp4" loop muted playsinline></video>
    <canvas id="gameCanvas" width="1280" height="720"></canvas>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const video = document.getElementById('bgVideo');

let phaseOverlay = {
    active: false,
    text: "",
    subtext: "",
    opacity: 0,
    timer: 0,
    duration: 150, 
    scale: 0.8,
    pendingMusic: null 
};

const assets = {
    images: {},
    sounds: {},
    totalResources: 0,
    loadedCount: 0
};

const IMAGE_RESOURCES = {
    "bg_level1": "assets/bg_level1.png",
    "bg_level2": "assets/bg_level2.png",
    "bg_level3": "assets/bg_level3.png", 
    "logo": "assets/logo_sort_the_trash.png",
    "win_img": "assets/menang.png",
    "lose_img": "assets/game_over.png",
    "heart": "assets/hati.png",
    "bin_organik": "assets/bin_organik.png",
    "bin_anorganik": "assets/bin_anorganik.png",
    "bin_b3": "assets/bin_b3.png",
    "btn_play": "assets/btn_play.png",
    "btn_play_h": "assets/btn_play_hold.png",
    "btn_levels": "assets/btn_levels.png",
    "btn_levels_h": "assets/btn_levels_hold.png",
    "btn_guide": "assets/btn_guide.png",
    "btn_guide_h": "assets/btn_guide_hold.png",
    "btn_restart": "assets/btn_restart.png",
    "btn_restart_h": "assets/btn_restart_hold.png",
    "btn_home": "assets/btn_home.png",
    "btn_home_h": "assets/btn_home_hold.png",
    "btn_continue": "assets/btn_continue.png",
    "btn_continue_h": "assets/btn_continue_hold.png",
    "botol": "assets/item_botol.png",
    "pisang": "assets/item_pisang.png",
    "baterai": "assets/item_baterai.png",
    "sapu": "assets/item_sapu.png",
    "bangku": "assets/item_bangku.png",
    "sepeda": "assets/item_sepeda.png",
    "duri": "assets/duri_ikan.png",
    "kaleng": "assets/kaleng.png",
    "pemutih": "assets/botol_pemutih.png",
    "kursi1": "assets/kursi_1.png",
    "kursi2": "assets/kursi_2.png",
    "meja": "assets/meja.png",
    "cermin": "assets/hiasan_cermin.png",
    "meja_kecil": "assets/hiasan_meja_kecil.png",
    "custom_kasur": "assets/hiasan_kasur.png",
    "lukisan1": "assets/hiasan_lukisan1.png",
    "lukisan2": "assets/hiasan_lukisan2.png",
    "lukisan3": "assets/hiasan_lukisan3.png",
    "lukisan4": "assets/hiasan_lukisan4.png",
    "tisu": "assets/item_tisu.png",
    "sisa_makanan": "assets/item_sisa_makanan.png",
    "plastik": "assets/item_plastik.png",
    "obat_nyamuk": "assets/item_obat_nyamuk.png",
    "kabel": "assets/item_kabel.png"
};

const AUDIO_RESOURCES = {
    "lobby": "assets/stt_lobby.mp3",
    "ingame": "assets/stt_ingame.mp3",
    "win": "assets/stt_menang.mp3",
    "lose": "assets/stt_kalah.mp3",
    "click": "assets/stt_klik_tombol.mp3",
    "trash": "assets/stt_buang_sampah.mp3"
};

class SpriteItem {
    constructor(assetId, trashType, xPos, yPos, width, height, canBeThrown = true) {
        this.id = assetId;
        this.type = trashType;
        this.x = xPos;
        this.y = yPos;
        this.w = width;
        this.h = height;
        this.initialX = xPos;
        this.initialY = yPos;
        this.isTrash = canBeThrown;
        this.isBeingDragged = false;
    }

    render(renderingContext) {
        const imageRef = assets.images[this.id];
        if (imageRef && imageRef.complete) {
            renderingContext.drawImage(imageRef, this.x, this.y, this.w, this.h);
        } else {
            renderingContext.fillStyle = this.isTrash ? "#e67e22" : "#3498db";
            renderingContext.fillRect(this.x, this.y, this.w, this.h);
        }
    }

    returnToOrigin() {
        this.x = this.initialX;
        this.y = this.initialY;
    }
}

let currentState = "INIT";
let activeLevel = 1;
let playerLives = 3;
let dragSubject = null;
let currentHoverButton = null;
let gameObjects = [];
let screenShakeCounter = 0;
let gameTimer = 80; 
let timerInterval = null;

const menuConfig = {
    logo: { x: 430, y: 50, w: 500, h: 240 },
    buttons: { x: 500, w: 330, h: 95 }
};

const BIN_DEFINITIONS = [
    { type: "organik", x: 850, y: 480, w: 110, h: 200 },
    { type: "anorganik", x: 980, y: 480, w: 110, h: 200 },
    { type: "b3", x: 1110, y: 480, w: 110, h: 200 }
];

function handleBGM(musicKey) {
    const listBGM = ['lobby', 'ingame', 'win', 'lose'];
    listBGM.forEach(k => {
        if (assets.sounds[k]) {
            assets.sounds[k].pause();
            assets.sounds[k].currentTime = 0;
        }
    });
    if (assets.sounds[musicKey]) {
        assets.sounds[musicKey].loop = true;
        assets.sounds[musicKey].play().catch(e => {});
    }
}

function stopAllBGM() {
    ['lobby', 'ingame', 'win', 'lose'].forEach(k => {
        if (assets.sounds[k]) {
            assets.sounds[k].pause();
            assets.sounds[k].currentTime = 0;
        }
    });
}

function executeSFX(sfxKey) {
    if (assets.sounds[sfxKey]) {
        assets.sounds[sfxKey].currentTime = 0;
        assets.sounds[sfxKey].play().catch(e => {});
    }
}

function setupLevel(lvlNumber) {
    activeLevel = lvlNumber;
    playerLives = 3;
    gameObjects = [];
    dragSubject = null;
    clearInterval(timerInterval);
    gameTimer = (lvlNumber === 3) ? 80 : 90;
    video.pause();

    if (lvlNumber === 1) {
        stopAllBGM(); 
        phaseOverlay = {
            active: true,
            text: "Fase 1:",
            subtext: "Awal Dari Rumah Dimulai",
            opacity: 0,
            timer: 0,
            duration: 150, 
            scale: 0.7,
            pendingMusic: 'ingame'
        };

        gameObjects.push(new SpriteItem("botol", "anorganik", 300, 510, 40, 90, true));
        gameObjects.push(new SpriteItem("pisang", "organik", 500, 550, 80, 80, true));
        gameObjects.push(new SpriteItem("baterai", "b3", 740, 590, 40, 60, true));
        gameObjects.push(new SpriteItem("sapu", "hiasan", 680, 390, 40, 100, false));
        gameObjects.push(new SpriteItem("bangku", "hiasan", 320, 600, 120, 120, false));
        gameObjects.push(new SpriteItem("sepeda", "hiasan", 500, 420, 230, 170, false));
    } 
    else if (lvlNumber === 2) {
        gameObjects.push(new SpriteItem("kursi1", "hiasan", 750, 490, 180, 180, false));
        gameObjects.push(new SpriteItem("kursi2", "hiasan", 350, 490, 180, 180, false));
        gameObjects.push(new SpriteItem("meja", "hiasan", 515, 520, 250, 150, false));
        gameObjects.push(new SpriteItem("kaleng", "anorganik", 205, 560, 55, 80, true));
        gameObjects.push(new SpriteItem("pemutih", "b3", 400, 410, 45, 90, true));
        gameObjects.push(new SpriteItem("pisang", "organik", 100, 630, 80, 80, true));
        gameObjects.push(new SpriteItem("botol", "anorganik", 750, 410, 40, 90, true));
        gameObjects.push(new SpriteItem("duri", "organik", 600, 580, 80, 60, true));
        handleBGM('ingame');
    }
    else if (lvlNumber === 3) {
        gameObjects.push(new SpriteItem("cermin", "hiasan", 10, 250, 220, 450, false));
        gameObjects.push(new SpriteItem("meja_kecil", "hiasan", 290, 380, 120, 250, false));
        gameObjects.push(new SpriteItem("custom_kasur", "hiasan", 430, 430, 450, 220, false));
        gameObjects.push(new SpriteItem("lukisan2", "hiasan", 380, 320, 60, 80, false));
        gameObjects.push(new SpriteItem("lukisan3", "hiasan", 460, 320, 60, 80, false));
        gameObjects.push(new SpriteItem("lukisan4", "hiasan", 530, 320, 60, 80, false));
        gameObjects.push(new SpriteItem("lukisan1", "hiasan", 1100, 250, 120, 150, false));

        gameObjects.push(new SpriteItem("tisu", "organik", 680, 480, 50, 40, true));
        gameObjects.push(new SpriteItem("sisa_makanan", "organik", 600, 490, 90, 50, true));
        gameObjects.push(new SpriteItem("plastik", "anorganik", 680, 620, 80, 90, true));
        gameObjects.push(new SpriteItem("kaleng", "anorganik",240, 560, 50, 70, true));
        gameObjects.push(new SpriteItem("obat_nyamuk", "b3", 950, 380, 28, 82, true));
        gameObjects.push(new SpriteItem("kabel", "b3", 150, 650, 100, 50, true));

        timerInterval = setInterval(() => {
            gameTimer--;
            if (gameTimer <= 0) {
                clearInterval(timerInterval);
                currentState = "SCREEN_LOSE";
                handleBGM('lose');
            }
        }, 1000);
        handleBGM('ingame');
    }

    currentState = "IN_GAME";
}

function drawButtonUI(btnId, posX, posY, width, height, assetNormal, assetHover) {
    const isHovered = (currentHoverButton === btnId);
    const targetImage = isHovered ? assets.images[assetHover] : assets.images[assetNormal];
    if (targetImage && targetImage.complete) {
        ctx.drawImage(targetImage, posX, posY, width, height);
    }
}

function mainLoop() {
    ctx.clearRect(0, 0, 1280, 720);
    ctx.save();

    let shakeX = 0, shakeY = 0;
    if (currentState === "IN_GAME" && activeLevel === 3 && gameTimer <= 15 && gameTimer > 0) {
        let cycle = Math.sin(Date.now() / 318); 
        if (cycle > 0) {
            shakeX = (Math.random() * 6 - 3);
            shakeY = (Math.random() * 6 - 3);
        }
    }
    if (screenShakeCounter > 0) {
        shakeX += Math.random() * 10 - 5;
        shakeY += Math.random() * 10 - 5;
        screenShakeCounter--;
    }
    ctx.translate(shakeX, shakeY);

    if (currentState === "MAIN_MENU") {
        ctx.drawImage(video, 0, 0, 1280, 720);
        if (assets.images["logo"]) {
            ctx.drawImage(assets.images["logo"], menuConfig.logo.x, menuConfig.logo.y, menuConfig.logo.w, menuConfig.logo.h);
        }
        drawButtonUI("play", menuConfig.buttons.x, 310, menuConfig.buttons.w, menuConfig.buttons.h, "btn_play", "btn_play_h");
        drawButtonUI("levels", menuConfig.buttons.x, 430, menuConfig.buttons.w, menuConfig.buttons.h, "btn_levels", "btn_levels_h");
        drawButtonUI("guide", menuConfig.buttons.x, 550, menuConfig.buttons.w, menuConfig.buttons.h, "btn_guide", "btn_guide_h");
    } 
    else if (currentState === "IN_GAME" || currentState === "SCREEN_WIN" || currentState === "SCREEN_LOSE") {
        let currentBG = assets.images["bg_level1"];
        if(activeLevel === 2) currentBG = assets.images["bg_level2"];
        if(activeLevel === 3) currentBG = assets.images["bg_level3"];
        if (currentBG) ctx.drawImage(currentBG, 0, 0, 1280, 720);

        gameObjects.forEach(obj => { if (!obj.isTrash && obj !== dragSubject) obj.render(ctx); });
        BIN_DEFINITIONS.forEach(bin => {
            const imgBin = assets.images[`bin_${bin.type}`];
            if (imgBin) ctx.drawImage(imgBin, bin.x, bin.y, bin.w, bin.h);
        });
        gameObjects.forEach(obj => { if (obj.isTrash && obj !== dragSubject) obj.render(ctx); });
        if (dragSubject) dragSubject.render(ctx);

        for (let i = 0; i < playerLives; i++) {
            if (assets.images["heart"]) ctx.drawImage(assets.images["heart"], 1120 + (i * 45), 30, 40, 40);
        }

        if (activeLevel === 3 && currentState === "IN_GAME") {
            ctx.save();
            ctx.textAlign = "center";
            ctx.fillStyle = gameTimer <= 15 ? "#ff3333" : "white";
            ctx.font = "bold 40px Arial";
            ctx.fillText("WAKTU: " + gameTimer + "s", 640, 60);
            ctx.restore();
        }

        if (currentState === "SCREEN_WIN" || currentState === "SCREEN_LOSE") {
            ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
            ctx.fillRect(0, 0, 1280, 720);
            const resultHeader = (currentState === "SCREEN_WIN") ? assets.images["win_img"] : assets.images["lose_img"];
            if (resultHeader) ctx.drawImage(resultHeader, 415, 60, 450, 210);

            if (currentState === "SCREEN_WIN" && activeLevel < 3) {
                drawButtonUI("continue", 465, 290, 350, 100, "btn_continue", "btn_continue_h");
                drawButtonUI("restart", 465, 405, 350, 100, "btn_restart", "btn_restart_h");
                drawButtonUI("home", 465, 520, 350, 100, "btn_home", "btn_home_h");
            } else {
                drawButtonUI("restart", 465, 320, 350, 100, "btn_restart", "btn_restart_h");
                drawButtonUI("home", 465, 435, 350, 100, "btn_home", "btn_home_h");
            }
        }
    }
    ctx.restore();

    if (phaseOverlay.active) {
        phaseOverlay.timer++;
        if (phaseOverlay.timer < 30) { phaseOverlay.opacity += 0.035; phaseOverlay.scale += 0.003; } 
        else if (phaseOverlay.timer > phaseOverlay.duration - 30) { phaseOverlay.opacity -= 0.035; }

        ctx.save();
        ctx.globalAlpha = Math.max(0, Math.min(1, phaseOverlay.opacity));
        ctx.fillStyle = "rgba(0, 0, 0, 0.5)"; ctx.fillRect(0, 0, 1280, 720);
        ctx.fillStyle = "rgba(0, 0, 0, 0.75)"; ctx.fillRect(0, 270, 1280, 200);
        ctx.textAlign = "center"; ctx.translate(640, 345); ctx.scale(phaseOverlay.scale, phaseOverlay.scale);
        ctx.font = "bold 85px 'Verdana', sans-serif"; ctx.shadowColor = "rgba(0,0,0,1)"; ctx.shadowBlur = 25;
        ctx.fillStyle = "#FFD700"; ctx.fillText(phaseOverlay.text, 0, 0);
        ctx.font = "bold 48px 'Arial'"; ctx.fillStyle = "#FFFFFF"; ctx.fillText(phaseOverlay.subtext, 0, 80);
        ctx.restore();

        if (phaseOverlay.timer >= phaseOverlay.duration) {
            phaseOverlay.active = false;
            if (phaseOverlay.pendingMusic) { handleBGM(phaseOverlay.pendingMusic); phaseOverlay.pendingMusic = null; }
        }
    }
    requestAnimationFrame(mainLoop);
}

function calculateInputPos(e) {
    const rect = canvas.getBoundingClientRect();
    let clientX, clientY;

    if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
    } else if (e.changedTouches && e.changedTouches.length > 0) {
        clientX = e.changedTouches[0].clientX;
        clientY = e.changedTouches[0].clientY;
    } else {
        clientX = e.clientX;
        clientY = e.clientY;
    }

    const scaleX = 1280 / rect.width;
    const scaleY = 720 / rect.height;

    return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
    };
}

function handleInputDown(e) {
    // Memicu Fullscreen saat sentuhan pertama di mobile
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
    }

    if (currentState === "MAIN_MENU" || currentState === "LOADING") {
        video.play().catch(() => {});
        if (assets.sounds['lobby'] && assets.sounds['lobby'].paused) handleBGM('lobby');
    }

    const pos = calculateInputPos(e);

    if (currentState === "MAIN_MENU") {
        if (checkCollision(pos, menuConfig.buttons.x, 310, menuConfig.buttons.w, menuConfig.buttons.h)) currentHoverButton = "play";
        if (checkCollision(pos, menuConfig.buttons.x, 430, menuConfig.buttons.w, menuConfig.buttons.h)) currentHoverButton = "levels";
        if (checkCollision(pos, menuConfig.buttons.x, 550, menuConfig.buttons.w, menuConfig.buttons.h)) currentHoverButton = "guide";
    } 
    else if (currentState === "IN_GAME") {
        for (let i = gameObjects.length - 1; i >= 0; i--) {
            const target = gameObjects[i];
            if (checkCollision(pos, target.x, target.y, target.w, target.h)) {
                dragSubject = target;
                dragSubject.isBeingDragged = true;
                break;
            }
        }
    }
    else if (currentState === "SCREEN_WIN" || currentState === "SCREEN_LOSE") {
        if (currentState === "SCREEN_WIN" && activeLevel < 3) {
            if (checkCollision(pos, 465, 290, 350, 100)) currentHoverButton = "continue";
            if (checkCollision(pos, 465, 405, 350, 100)) currentHoverButton = "restart";
            if (checkCollision(pos, 465, 520, 350, 100)) currentHoverButton = "home";
        } else {
            if (checkCollision(pos, 465, 320, 350, 100)) currentHoverButton = "restart";
            if (checkCollision(pos, 465, 435, 350, 100)) currentHoverButton = "home";
        }
    }
}

function handleInputMove(e) {
    if (!dragSubject) return;
    const pos = calculateInputPos(e);
    dragSubject.x = pos.x - dragSubject.w / 2;
    dragSubject.y = pos.y - dragSubject.h / 2;
}

function handleInputUp(e) {
    const pos = calculateInputPos(e);
    
    if (currentHoverButton) {
        executeSFX('click');
        if (currentHoverButton === "play") setupLevel(1);
        if (currentHoverButton === "continue") {
            if(activeLevel === 1) setupLevel(2); else if(activeLevel === 2) setupLevel(3);
        }
        if (currentHoverButton === "restart") setupLevel(activeLevel);
        if (currentHoverButton === "home") { 
            clearInterval(timerInterval); currentState = "MAIN_MENU"; handleBGM('lobby'); video.play();
        }
    }

    if (dragSubject) {
        let targetBin = BIN_DEFINITIONS.find(bin => checkCollision(pos, bin.x, bin.y, bin.w, bin.h));
        if (targetBin && dragSubject.isTrash && dragSubject.type === targetBin.type) {
            executeSFX('trash');
            gameObjects = gameObjects.filter(item => item !== dragSubject);
            if (gameObjects.filter(item => item.isTrash).length === 0) {
                clearInterval(timerInterval);
                if (activeLevel === 3) {
                    stopAllBGM();
                    phaseOverlay = { active: true, text: "Fase 1:", subtext: "Awal Dari Rumah Selesai", opacity: 0, timer: 0, duration: 150, scale: 0.7, pendingMusic: 'win' };
                } else { handleBGM('win'); }
                currentState = "SCREEN_WIN"; 
            }
        } else {
            if (dragSubject.isTrash && targetBin) {
                playerLives--; screenShakeCounter = 15; executeSFX('click');
                if (playerLives <= 0) { clearInterval(timerInterval); currentState = "SCREEN_LOSE"; handleBGM('lose'); }
            }
            dragSubject.returnToOrigin();
        }
        dragSubject.isBeingDragged = false;
        dragSubject = null;
    }
    currentHoverButton = null;
}

canvas.addEventListener('mousedown', handleInputDown);
window.addEventListener('mousemove', handleInputMove);
window.addEventListener('mouseup', handleInputUp);

canvas.addEventListener('touchstart', (e) => { 
    if (e.cancelable) e.preventDefault(); 
    handleInputDown(e); 
}, {passive: false});

canvas.addEventListener('touchmove', (e) => { 
    if (e.cancelable) e.preventDefault(); 
    handleInputMove(e); 
}, {passive: false});

canvas.addEventListener('touchend', (e) => { 
    if (e.cancelable) e.preventDefault(); 
    handleInputUp(e); 
}, {passive: false});

function checkCollision(pos, x, y, w, h) {
    return pos.x >= x && pos.x <= x + w && pos.y >= y && pos.y <= y + h;
}

function initializeGame() {
    currentState = "LOADING";
    const imageKeys = Object.keys(IMAGE_RESOURCES);
    const audioKeys = Object.keys(AUDIO_RESOURCES);
    assets.totalResources = imageKeys.length + audioKeys.length;

    imageKeys.forEach(key => {
        const img = new Image();
        img.src = IMAGE_RESOURCES[key];
        img.onload = () => { assets.images[key] = img; resourceLoaded(); };
        img.onerror = () => { resourceLoaded(); };
    });

    audioKeys.forEach(key => {
        const sound = new Audio();
        sound.src = AUDIO_RESOURCES[key];
        sound.load();
        sound.oncanplaythrough = () => { if (!assets.sounds[key]) { assets.sounds[key] = sound; resourceLoaded(); } };
        sound.onerror = () => { resourceLoaded(); };
    });
}

function resourceLoaded() {
    assets.loadedCount++;
    if (assets.loadedCount >= assets.totalResources) {
        setTimeout(() => {
            currentState = "MAIN_MENU";
            handleBGM('lobby');
            video.play().catch(() => {});
        }, 500);
    }
}

initializeGame();
mainLoop();
</script>
</body>
</html>
